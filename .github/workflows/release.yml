name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号，例如 v2.7.0'
        required: true
        default: 'v2.7.0'
      target_ref:
        description: '发布所基于的分支名或提交 SHA'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}" \
            -o gwxapkg-${{ matrix.suffix }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gwxapkg-${{ matrix.suffix }}
          path: gwxapkg-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          target_commitish: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.sha }}
          files: dist/*
          generate_release_notes: true
          body: |
            ## Gwxapkg ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

            ### 下载说明
            | 文件 | 适用平台 |
            |------|---------|
            | `gwxapkg-windows-amd64.exe` | Windows 64位 |
            | `gwxapkg-linux-amd64` | Linux 64位 |
            | `gwxapkg-darwin-amd64` | macOS Intel |
            | `gwxapkg-darwin-arm64` | macOS Apple Silicon |

            ### 使用方法
            ```bash
            # Windows (PowerShell)
            .\gwxapkg-windows-amd64.exe scan

            # Linux / macOS
            chmod +x gwxapkg-linux-amd64
            ./gwxapkg-linux-amd64 scan
            ```
